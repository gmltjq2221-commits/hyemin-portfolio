<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin - HHM Film</title>
	<style>
		@font-face { font-family: "Elice DX Neolli"; src: url("fonts/EliceDXNeolli-Light.ttf") format("truetype"); font-weight: 300; font-style: normal; font-display: swap; }
		@font-face { font-family: "Elice DX Neolli"; src: url("fonts/EliceDXNeolli-Medium.ttf") format("truetype"); font-weight: 500; font-style: normal; font-display: swap; }
		@font-face { font-family: "Elice DX Neolli"; src: url("fonts/EliceDXNeolli-Bold.ttf") format("truetype"); font-weight: 800; font-style: normal; font-display: swap; }
		:root { --white: #ffffff; --black: #080808; --text: #111111; --muted: #767676; --line: #dedede; --line-dark: #242424; --soft: #f5f5f5; --header-h: 82px; }
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body { font-family: "Elice DX Neolli", Arial, "Noto Sans KR", sans-serif; color: var(--text); background: var(--white); overflow-x: hidden; }
		a { color: inherit; text-decoration: none; }
		button, input, textarea, select { font-family: inherit; }
		button { cursor: pointer; }
		input, textarea, select { width: 100%; border: 1px solid var(--line); background: var(--white); color: var(--text); outline: none; font-size: 14px; }
		input, select { height: 44px; padding: 0 12px; }
		textarea { min-height: 110px; padding: 12px; resize: vertical; line-height: 1.7; }
		header { position: sticky; top: 0; z-index: 100; width: 100%; background: rgba(255, 255, 255, 0.94); border-bottom: 1px solid var(--line); backdrop-filter: blur(14px); }
		.nav { display: flex; align-items: center; justify-content: space-between; max-width: 1440px; height: var(--header-h); margin: 0 auto; padding: 0 48px; }
		.logo { font-size: 18px; font-weight: 800; letter-spacing: 0.08em; }
		.logo span { display: block; margin-top: 4px; font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 0.22em; }
		.header-actions { display: flex; align-items: center; gap: 8px; }
		.header-link, .logout-btn { display: inline-flex; align-items: center; justify-content: center; min-height: 38px; padding: 0 15px; border: 1px solid transparent; background: transparent; color: var(--text); font-size: 13px; font-weight: 700; letter-spacing: 0.04em; transition: 0.2s ease; }
		.header-link:hover, .logout-btn:hover { border-color: var(--black); background: var(--black); color: var(--white); }
		main { max-width: 1440px; margin: 0 auto; padding: 70px 48px 100px; }
		.page-head { margin-bottom: 34px; }
		.page-title { font-size: clamp(44px, 7vw, 96px); font-weight: 500; letter-spacing: -0.07em; line-height: 0.95; }
		.page-desc { margin-top: 16px; color: var(--muted); font-size: 15px; line-height: 1.8; }
		.login-box { max-width: 460px; margin-top: 40px; padding: 28px; border: 1px solid var(--black); }
		.login-title, .panel-title { margin-bottom: 20px; font-size: 24px; font-weight: 800; letter-spacing: -0.03em; }
		.admin-area { display: none; }
		.grid { display: grid; grid-template-columns: minmax(0, 0.92fr) minmax(360px, 0.58fr); gap: 28px; align-items: start; }
		.panel { padding: 28px; border: 1px solid var(--black); background: var(--white); }
		.panel + .panel { margin-top: 28px; }
		.form-row { margin-bottom: 16px; }
		.form-row label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 800; }
		.form-help { margin-top: 8px; color: var(--muted); font-size: 12px; line-height: 1.5; word-break: keep-all; }
		.form-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px; }
		.btn, .small-btn { display: inline-flex; align-items: center; justify-content: center; min-height: 42px; padding: 0 16px; border: 1px solid var(--black); background: var(--black); color: var(--white); font-size: 13px; font-weight: 800; transition: 0.2s ease; }
		.btn.dark, .small-btn { background: var(--white); color: var(--black); }
		.btn:hover, .small-btn:hover { opacity: 0.78; }
		.small-btn.danger { background: #7e2a2a; border-color: #7e2a2a; color: var(--white); }
		.message { display: none; margin-bottom: 18px; padding: 13px 15px; border: 1px solid var(--black); font-size: 14px; }
		.post-card { padding: 16px; border: 1px solid var(--line); margin-bottom: 12px; }
		.post-title { font-size: 16px; font-weight: 800; word-break: keep-all; }
		.post-meta { margin-top: 6px; color: var(--muted); font-size: 12px; line-height: 1.5; }
		.post-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
		.guide-box { padding: 14px; border: 1px solid var(--line); background: var(--soft); color: var(--muted); font-size: 13px; line-height: 1.7; word-break: keep-all; }
		.loading { display: none; position: fixed; left: 50%; bottom: 28px; z-index: 200; transform: translateX(-50%); padding: 12px 18px; border-radius: 999px; background: rgba(0, 0, 0, 0.78); color: rgba(255, 255, 255, 0.78); font-size: 13px; backdrop-filter: blur(8px); }
		@media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
		@media (max-width: 760px) { .nav { height: auto; align-items: flex-start; flex-direction: column; gap: 14px; padding: 18px 20px; } .header-actions { flex-wrap: wrap; } main { padding: 50px 20px 80px; } .panel { padding: 20px; } }
	</style>
</head>
<body>
	<header>
		<nav class="nav">
			<a href="index.html" class="logo">HHM FILM<span>ADMIN</span></a>
			<div class="header-actions"><a href="index.html" class="header-link">Home</a><a href="images.html" class="header-link">Photography</a><a href="videos.html" class="header-link">Videography</a><button type="button" class="logout-btn" id="logoutBtn" style="display:none;">Logout</button></div>
		</nav>
	</header>
	<main>
		<div class="page-head"><h1 class="page-title">Admin</h1><p class="page-desc">대표작, Photography, Videography, 작가 정보를 관리합니다.</p></div>
		<section class="login-box" id="loginBox">
			<h2 class="login-title">Login</h2>
			<div class="message" id="loginMessage"></div>
			<form id="loginForm">
				<div class="form-row"><label for="loginEmail">이메일</label><input type="email" id="loginEmail" autocomplete="email" required></div>
				<div class="form-row"><label for="loginPassword">비밀번호</label><input type="password" id="loginPassword" autocomplete="current-password" required></div>
				<div class="form-actions"><button type="submit" class="btn">로그인</button></div>
			</form>
		</section>
		<section class="admin-area" id="adminArea">
			<div class="message" id="adminMessage"></div>
			<div class="grid">
				<div>
					<section class="panel">
						<h2 class="panel-title">게시글 등록 / 수정</h2>
						<form id="postForm">
							<input type="hidden" id="postId">
							<div class="form-row"><label for="boardCode">어디에 노출할까요?</label><select id="boardCode" required><option value="FEATURED_IMAGE">메인 대표 Photography</option><option value="FEATURED_VIDEO">메인 대표 Videography</option><option value="IMAGE_ARCHIVE">Photography 목록</option><option value="VIDEO_ARCHIVE">Videography 목록</option></select><p class="form-help" id="boardHelp"></p></div>
							<div class="form-row"><label for="categoryCode">카테고리</label><select id="categoryCode"><option value="performance">Performance</option><option value="exhibition">Exhibition</option><option value="festival-event">Festival / Event</option><option value="interview">Interview</option></select></div>
							<div class="form-row"><label for="postTitle">제목</label><input type="text" id="postTitle" required></div>
							<div class="form-row"><label for="postCaption">짧은 설명</label><input type="text" id="postCaption"></div>
							<div class="form-row"><label for="postDescription">상세 설명</label><textarea id="postDescription"></textarea></div>
							<div class="form-row" id="thumbnailRow"><label for="thumbnailUrl">목록용 썸네일 URL</label><input type="url" id="thumbnailUrl"><p class="form-help" id="thumbnailHelp"></p></div>
							<div class="form-row"><label for="sortOrder">정렬 순서</label><input type="number" id="sortOrder" value="0"></div>
							<div class="form-row"><label for="isVisible">노출 여부</label><select id="isVisible"><option value="true">노출</option><option value="false">숨김</option></select></div>
							<div class="form-row"><label for="itemUrls" id="itemUrlsLabel">이미지 / 유튜브 URL</label><textarea id="itemUrls" placeholder="한 줄에 하나씩 입력"></textarea><p class="form-help" id="itemUrlsHelp"></p></div>
							<div class="form-row"><label for="itemCaptions">항목별 캡션</label><textarea id="itemCaptions" placeholder="URL 순서와 맞춰 한 줄에 하나씩 입력"></textarea></div>
							<div class="form-row"><label for="itemDescriptions">항목별 설명</label><textarea id="itemDescriptions" placeholder="URL 순서와 맞춰 한 줄에 하나씩 입력"></textarea></div>
							<div class="form-actions"><button type="submit" class="btn">저장</button><button type="button" class="btn dark" id="resetPostBtn">초기화</button></div>
						</form>
					</section>
					<section class="panel">
						<h2 class="panel-title">작가 정보</h2>
						<form id="profileForm">
							<input type="hidden" id="profileId">
							<div class="form-row"><label for="artistName">작가명</label><input type="text" id="artistName"></div>
							<div class="form-row"><label for="artistTitle">작가 타이틀</label><input type="text" id="artistTitle"></div>
							<div class="form-row"><label for="artistMessage">작가의 말</label><textarea id="artistMessage"></textarea></div>
							<div class="form-row"><label for="email">이메일</label><input type="email" id="email"></div>
							<div class="form-row"><label for="instagramUrl">인스타그램 URL</label><input type="url" id="instagramUrl"></div>
							<div class="form-row"><label for="phone">연락처</label><input type="text" id="phone"></div>
							<div class="form-row"><label for="profileImageUrl">프로필 이미지 URL</label><input type="url" id="profileImageUrl"></div>
							<div class="form-actions"><button type="submit" class="btn">작가 정보 저장</button></div>
						</form>
					</section>
				</div>
				<div>
					<section class="panel">
						<h2 class="panel-title">게시글 목록</h2>
						<div class="form-row"><label for="filterBoardCode">게시판 필터</label><select id="filterBoardCode"><option value="">전체</option><option value="FEATURED_IMAGE">메인 대표 Photography</option><option value="FEATURED_VIDEO">메인 대표 Videography</option><option value="IMAGE_ARCHIVE">Photography 목록</option><option value="VIDEO_ARCHIVE">Videography 목록</option></select></div>
						<div class="list" id="postList"></div>
					</section>
					<section class="panel"><h2 class="panel-title">입력 안내</h2><div class="guide-box">대표 Videography는 썸네일을 사용하지 않습니다. 유튜브 URL만 입력하면 메인 화면에서 영상이 바로 보이고, 클릭 시 상세 페이지로 이동합니다.</div></section>
				</div>
			</div>
		</section>
	</main>
	<div class="loading" id="loading">Loading</div>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="js/supabase.js"></script>
	<script src="js/admin.js"></script>
</body>
</html>
