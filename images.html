<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Photography - HHM Film</title>
	<style>
		@font-face { font-family: "Elice DX Neolli"; src: url("fonts/EliceDXNeolli-Light.ttf") format("truetype"); font-weight: 300; font-style: normal; font-display: swap; }
		@font-face { font-family: "Elice DX Neolli"; src: url("fonts/EliceDXNeolli-Medium.ttf") format("truetype"); font-weight: 500; font-style: normal; font-display: swap; }
		@font-face { font-family: "Elice DX Neolli"; src: url("fonts/EliceDXNeolli-Bold.ttf") format("truetype"); font-weight: 800; font-style: normal; font-display: swap; }
		:root { --white: #ffffff; --black: #080808; --text: #111111; --muted: #767676; --line: #dedede; --line-dark: #242424; --soft: #f5f5f5; --header-h: 82px; }
		* { box-sizing: border-box; margin: 0; padding: 0; }
		html { scroll-behavior: smooth; }
		body { font-family: "Elice DX Neolli", Arial, "Noto Sans KR", sans-serif; color: var(--text); background: var(--white); overflow-x: hidden; }
		a { color: inherit; text-decoration: none; }
		img { display: block; width: 100%; height: 100%; object-fit: cover; }
		button { font-family: inherit; }
		header { position: fixed; top: 0; left: 0; z-index: 100; width: 100%; background: rgba(255, 255, 255, 0.94); border-bottom: 1px solid var(--line); backdrop-filter: blur(14px); }
		.nav { display: flex; align-items: center; justify-content: space-between; max-width: 1440px; height: var(--header-h); margin: 0 auto; padding: 0 48px; }
		.logo { font-size: 18px; font-weight: 800; letter-spacing: 0.08em; }
		.logo span { display: block; margin-top: 4px; font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 0.22em; }
		.nav-head { display: flex; align-items: center; justify-content: space-between; }
		.mobile-menu-btn { display: none; align-items: center; justify-content: center; flex-direction: column; gap: 5px; width: 44px; height: 44px; border: 1px solid var(--black); background: var(--white); cursor: pointer; }
		.mobile-menu-btn span { display: block; width: 18px; height: 2px; background: var(--black); transition: 0.2s ease; }
		.mobile-menu-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
		.mobile-menu-btn.open span:nth-child(2) { opacity: 0; }
		.mobile-menu-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
		.menu { display: flex; align-items: center; gap: 8px; }
		.menu-link { display: inline-flex; align-items: center; justify-content: center; min-height: 38px; padding: 0 15px; border: 1px solid transparent; background: transparent; color: var(--text); font-size: 13px; font-weight: 700; letter-spacing: 0.04em; cursor: pointer; transition: 0.2s ease; }
		.menu-link:hover, .menu-link.active { border-color: var(--black); background: var(--black); color: var(--white); }
		main { padding-top: var(--header-h); }
		.section { max-width: 1440px; min-height: calc(100vh - var(--header-h)); margin: 0 auto; padding: 100px 48px; }
		.kicker { margin-bottom: 14px; font-size: 12px; font-weight: 800; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; }
		.section-title { font-size: clamp(44px, 7vw, 96px); font-weight: 500; letter-spacing: -0.07em; line-height: 0.95; }
		.archive-head { display: flex; align-items: end; justify-content: space-between; gap: 24px; margin-bottom: 44px; }
		.archive-desc { max-width: 460px; color: var(--muted); font-size: 15px; line-height: 1.8; word-break: keep-all; }
		.image-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
		.image-item { position: relative; aspect-ratio: 1 / 1; overflow: hidden; background: var(--soft); cursor: pointer; }
		.image-item::after { content: attr(data-title); position: absolute; left: 10px; bottom: 10px; padding: 8px 10px; background: rgba(255, 255, 255, 0.9); color: var(--black); font-size: 12px; font-weight: 800; opacity: 0; transform: translateY(6px); transition: 0.2s ease; }
		.image-item:hover::after { opacity: 1; transform: translateY(0); }
		.empty-list { display: none; }
		footer { padding: 34px 48px; border-top: 1px solid var(--line); text-align: center; color: var(--muted); font-size: 13px; }
		.loading { position: fixed; left: 50%; bottom: 28px; z-index: 200; transform: translateX(-50%); padding: 12px 18px; border-radius: 999px; background: rgba(0, 0, 0, 0.78); color: rgba(255, 255, 255, 0.78); font-size: 13px; backdrop-filter: blur(8px); }
		.loading.hide { display: none; }
		@media (max-width: 1100px) { .image-grid { grid-template-columns: repeat(3, 1fr); } }
		@media (max-width: 860px) { :root { --header-h: auto; } header { position: sticky; } .nav { height: auto; align-items: stretch; flex-direction: column; gap: 0; padding: 14px 20px; } .nav-head { width: 100%; } .mobile-menu-btn { display: inline-flex; } .menu { display: none; grid-template-columns: 1fr; gap: 8px; width: 100%; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); } .menu.open { display: grid; } .menu-link { justify-content: space-between; width: 100%; min-height: 46px; padding: 0 16px; border-color: var(--line); font-size: 14px; } main { padding-top: 0; } .section { padding: 76px 22px; } .archive-head { align-items: flex-start; flex-direction: column; } .image-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; } }
		@media (max-width: 560px) { .logo { font-size: 16px; } .section { padding: 64px 18px; } .section-title { font-size: clamp(42px, 16vw, 64px); } footer { padding: 28px 18px; } }
	</style>
</head>
<body data-board-code="IMAGE_ARCHIVE" data-page-kind="image">
	<header>
		<nav class="nav">
			<div class="nav-head">
				<a href="index.html" class="logo">HHM FILM<span>PHOTO · VIDEO</span></a>
				<button type="button" class="mobile-menu-btn" onclick="toggleMobileMenu(event)" aria-label="메뉴 열기" aria-controls="siteMenu" aria-expanded="false"><span></span><span></span><span></span></button>
			</div>
			<div id="siteMenu" class="menu">
				<a href="index.html" class="menu-link">Home</a>
				<a href="images.html" class="menu-link active">Photography</a>
				<a href="videos.html" class="menu-link">Videography</a>
				<a href="index.html#about" class="menu-link">About</a>
			</div>
		</nav>
	</header>
	<main>
		<section class="section">
			<div class="archive-head">
				<div><p class="kicker">Photography</p><h1 class="section-title">Photo<br>Archive</h1></div>
				<!--<p class="archive-desc">Photography 작업 목록입니다.</p>-->
			</div>
			<div id="archiveList" class="image-grid"></div>
		</section>
	</main>
	<footer>© <span id="year"></span> HHM FILM. All rights reserved.</footer>
	<div class="loading" id="loading">Loading</div>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="js/supabase.js"></script>
	<script src="js/archive.js"></script>
</body>
</html>
