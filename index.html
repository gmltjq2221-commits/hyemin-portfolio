<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>HHM Film</title>

	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

	<style>
	* { box-sizing: border-box; margin: 0; padding: 0; }
	html { scroll-behavior: smooth; }
	body { font-family: "Pretendard", sans-serif; background: #0f0f0f; color: #f5f5f5; line-height: 1.6; }
	a { color: inherit; text-decoration: none; }
	img { display: block; width: 100%; }
	button { font-family: inherit; border: 0; background: none; cursor: pointer; }

	.wrap { width: 100%; min-height: 100vh; overflow-x: hidden; }
	.header { position: fixed; top: 0; left: 0; z-index: 100; width: 100%; padding: 24px 48px; background: rgba(15, 15, 15, 0.72); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
	.header-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; max-width: 1440px; margin: 0 auto; }
	.logo { font-family: "Playfair Display", serif; font-size: 28px; font-weight: 700; letter-spacing: 0.12em; white-space: nowrap; }
	.nav { display: flex; align-items: center; gap: 34px; }
	.nav a { position: relative; font-size: 14px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255, 255, 255, 0.76); transition: color 0.25s ease; }
	.nav a:hover, .nav a.active { color: #fff; }
	.nav a::after { content: ""; position: absolute; left: 0; bottom: -6px; width: 0; height: 1px; background: #fff; transition: width 0.25s ease; }
	.nav a:hover::after, .nav a.active::after { width: 100%; }
	.menu-btn { display: none; width: 34px; height: 24px; flex-direction: column; justify-content: space-between; }
	.menu-btn span { display: block; width: 100%; height: 2px; background: #fff; }

	.main { padding-top: 84px; }
	.section { min-height: 100vh; padding: 110px 48px; }
	.section-inner { width: 100%; max-width: 1440px; margin: 0 auto; }
	.hero { display: flex; align-items: center; min-height: calc(100vh - 84px); padding-top: 80px; padding-bottom: 80px; background: linear-gradient(rgba(15, 15, 15, 0.58), rgba(15, 15, 15, 0.92)), radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.14), transparent 34%); }
	.hero-title { max-width: 980px; font-family: "Playfair Display", serif; font-size: clamp(54px, 9vw, 132px); font-weight: 700; line-height: 0.96; letter-spacing: -0.04em; }
	.hero-sub { margin-top: 34px; max-width: 640px; font-size: 18px; font-weight: 300; color: rgba(255, 255, 255, 0.72); }

	.featured-section { background: #f5f5f5; color: #111; }
	.section-head { display: flex; align-items: end; justify-content: space-between; gap: 24px; margin-bottom: 44px; }
	.section-title { font-family: "Playfair Display", serif; font-size: clamp(38px, 6vw, 78px); font-weight: 700; line-height: 1; letter-spacing: -0.03em; }
	.section-desc { max-width: 430px; font-size: 15px; color: rgba(17, 17, 17, 0.64); }
	.feature-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 28px; }
	.feature-card { position: relative; display: block; min-height: 620px; overflow: hidden; background: #111; color: #fff; }
	.feature-card.is-empty { pointer-events: none; }
	.feature-thumb { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.86; transform: scale(1.01); transition: transform 0.55s ease, opacity 0.35s ease; }
	.feature-card:hover .feature-thumb { transform: scale(1.06); opacity: 0.72; }
	.feature-dim { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0, 0, 0, 0.82), rgba(0, 0, 0, 0.1) 62%, rgba(0, 0, 0, 0.2)); }
	.feature-info { position: absolute; left: 32px; right: 32px; bottom: 32px; z-index: 2; }
	.feature-type { display: inline-flex; margin-bottom: 14px; padding: 7px 12px; border: 1px solid rgba(255, 255, 255, 0.38); border-radius: 999px; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
	.feature-title { font-size: clamp(28px, 3vw, 44px); font-weight: 700; line-height: 1.18; word-break: keep-all; }
	.feature-caption { margin-top: 12px; font-size: 15px; color: rgba(255, 255, 255, 0.72); word-break: keep-all; }
	.play-icon { position: absolute; top: 32px; right: 32px; z-index: 2; display: flex; align-items: center; justify-content: center; width: 74px; height: 74px; border: 1px solid rgba(255, 255, 255, 0.58); border-radius: 50%; background: rgba(0, 0, 0, 0.24); backdrop-filter: blur(8px); }
	.play-icon::before { content: ""; display: block; margin-left: 5px; width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-left: 18px solid #fff; }
	.empty-box { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 30px; background: #191919; color: rgba(255, 255, 255, 0.54); font-size: 15px; text-align: center; }

	.about-section { background: #0f0f0f; color: #f5f5f5; }
	.about-grid { display: grid; grid-template-columns: 0.86fr 1.14fr; gap: 70px; align-items: center; }
	.profile-image-wrap { position: relative; overflow: hidden; background: #1d1d1d; aspect-ratio: 4 / 5; }
	.profile-image { width: 100%; height: 100%; object-fit: cover; }
	.profile-empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: rgba(255, 255, 255, 0.42); font-size: 14px; }
	.about-label { margin-bottom: 18px; font-size: 13px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255, 255, 255, 0.54); }
	.about-name { font-family: "Playfair Display", serif; font-size: clamp(42px, 6vw, 86px); font-weight: 700; line-height: 1; letter-spacing: -0.04em; }
	.about-title { margin-top: 16px; font-size: 18px; color: rgba(255, 255, 255, 0.62); }
	.about-message { margin-top: 40px; max-width: 720px; font-size: clamp(18px, 2vw, 25px); font-weight: 300; line-height: 1.72; color: rgba(255, 255, 255, 0.84); white-space: pre-line; word-break: keep-all; }
	.about-contact { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 42px; }
	.about-contact a, .about-contact span { display: inline-flex; align-items: center; min-height: 42px; padding: 0 18px; border: 1px solid rgba(255, 255, 255, 0.22); border-radius: 999px; font-size: 14px; color: rgba(255, 255, 255, 0.76); }

	.footer { padding: 32px 48px; border-top: 1px solid rgba(255, 255, 255, 0.1); background: #0f0f0f; color: rgba(255, 255, 255, 0.42); font-size: 13px; }
	.footer-inner { max-width: 1440px; margin: 0 auto; display: flex; justify-content: space-between; gap: 20px; }
	.loading { position: fixed; left: 50%; bottom: 30px; z-index: 200; transform: translateX(-50%); padding: 12px 18px; border-radius: 999px; background: rgba(0, 0, 0, 0.78); color: rgba(255, 255, 255, 0.78); font-size: 13px; backdrop-filter: blur(8px); }
	.loading.hide { display: none; }

	@media (max-width: 1024px) {
		.header { padding: 20px 28px; }
		.section { padding: 90px 28px; }
		.feature-card { min-height: 520px; }
		.about-grid { grid-template-columns: 1fr; gap: 44px; }
		.profile-image-wrap { max-width: 520px; }
	}

	@media (max-width: 768px) {
		.header { padding: 18px 20px; }
		.logo { font-size: 23px; }
		.menu-btn { display: flex; }
		.nav { position: fixed; top: 69px; left: 0; display: none; width: 100%; padding: 24px 20px 28px; flex-direction: column; align-items: flex-start; gap: 18px; background: rgba(15, 15, 15, 0.96); border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
		.nav.active { display: flex; }
		.main { padding-top: 69px; }
		.section { min-height: auto; padding: 72px 20px; }
		.hero { min-height: calc(100vh - 69px); }
		.hero-sub { font-size: 16px; }
		.section-head { display: block; margin-bottom: 28px; }
		.section-desc { margin-top: 16px; }
		.feature-grid { grid-template-columns: 1fr; gap: 18px; }
		.feature-card { min-height: 420px; }
		.feature-info { left: 22px; right: 22px; bottom: 24px; }
		.play-icon { top: 22px; right: 22px; width: 58px; height: 58px; }
		.footer { padding: 28px 20px; }
		.footer-inner { display: block; }
		.footer-inner p + p { margin-top: 8px; }
	}
</style>
</head>

<body>
	<div class="wrap">
		<header class="header">
			<div class="header-inner">
				<a href="index.html" class="logo">HHM FILM</a>

				<button type="button" class="menu-btn" id="menuBtn" aria-label="메뉴 열기">
					<span></span>
					<span></span>
					<span></span>
				</button>

				<nav class="nav" id="nav">
					<a href="index.html" class="active">Home</a>
					<a href="images.html">Image</a>
					<a href="videos.html">Video</a>
					<a href="index.html#about">About</a>
				</nav>
			</div>
		</header>

		<main class="main">
			<section class="section hero" id="home">
				<div class="section-inner">
					<h1 class="hero-title">HHM<br />Film Portfolio</h1>
					<p class="hero-sub" id="heroText"></p>
				</div>
			</section>

			<section class="section featured-section" id="featured">
				<div class="section-inner">
					<div class="section-head">
						<h2 class="section-title">Featured</h2>
						<p class="section-desc">대표 이미지와 대표 동영상을 확인할 수 있습니다.</p>
					</div>

					<div class="feature-grid">
						<a href="javascript:void(0);" class="feature-card is-empty" id="featuredImageCard">
							<div class="empty-box">대표 이미지가 등록되지 않았습니다.</div>
						</a>

						<a href="javascript:void(0);" class="feature-card is-empty" id="featuredVideoCard">
							<div class="empty-box">대표 동영상이 등록되지 않았습니다.</div>
						</a>
					</div>
				</div>
			</section>

			<section class="section about-section" id="about">
				<div class="section-inner">
					<div class="about-grid">
						<div class="profile-image-wrap">
							<img src="" alt="" class="profile-image" id="profileImage" style="display: none;" />
							<div class="profile-empty" id="profileEmpty">프로필 이미지가 등록되지 않았습니다.</div>
						</div>

						<div class="about-content">
							<p class="about-label">About</p>
							<h2 class="about-name" id="artistName"></h2>
							<p class="about-title" id="artistTitle"></p>
							<p class="about-message" id="artistMessage"></p>

							<div class="about-contact" id="aboutContact"></div>
						</div>
					</div>
				</div>
			</section>
		</main>

		<footer class="footer">
			<div class="footer-inner">
				<p>© <span id="year"></span> HHM Film.</p>
				<p id="footerArtist"></p>
			</div>
		</footer>

		<div class="loading" id="loading">데이터를 불러오는 중입니다.</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="js/supabase.js"></script>
	<script src="js/main.js"></script>

	<script>
		document.addEventListener('DOMContentLoaded', function() {
			const menuBtn = document.getElementById('menuBtn');
			const nav = document.getElementById('nav');

			menuBtn.addEventListener('click', function() {
				nav.classList.toggle('active');
			});

			nav.querySelectorAll('a').forEach(function(link) {
				link.addEventListener('click', function() {
					nav.classList.remove('active');
				});
			});

			document.getElementById('year').textContent = new Date().getFullYear();
		});
	</script>
</body>
</html>
