<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>HHM Film Portfolio</title>
	<link rel="stylesheet" href="css/site.css?v=20260620-v10">
</head>
<body>
	<header>
		<nav class="nav">
			<div class="nav-head">
				<a href="#home" class="logo" data-view-link="home">HHM FILM</a>
				<button type="button" class="mobile-menu-btn" id="mobileMenuBtn" aria-label="메뉴 열기" aria-controls="siteMenu" aria-expanded="false"><span></span><span></span><span></span></button>
			</div>
			<div id="siteMenu" class="menu">
				<a href="#home" class="menu-link" data-view-link="home">Home</a>
				<a href="#photography" class="menu-link" data-view-link="photography">Photography</a>
				<a href="#videography" class="menu-link" data-view-link="videography">Videography</a>
				<a href="#about" class="menu-link" data-view-link="about">About</a>
			</div>
		</nav>
	</header>
	<main id="app" aria-live="polite"></main>
	<footer>© <span id="year"></span> HHM FILM. All rights reserved.</footer>
	<div class="loading hide" id="loading" aria-hidden="true">
		<div class="transition-base"></div>
		<div class="transition-panel transition-panel-left"></div>
		<div class="transition-panel transition-panel-right"></div>
		<div class="transition-beam transition-beam-one"></div>
		<div class="transition-beam transition-beam-two"></div>
		<div class="transition-orb transition-orb-one"></div>
		<div class="transition-orb transition-orb-two"></div>
		<div class="transition-grain"></div>
		<div class="transition-center"><span class="transition-dot"></span><span>HHM FILM</span></div>
		<div class="transition-progress"><span></span></div>
	</div>

	<!-- 페이지 조각 호출이 제한된 환경을 위한 내장 대체 템플릿 -->
	<template id="view-template-home"><section class="section featured">
	<div class="featured-heading"><p class="kicker">Selected Works</p><h1 class="featured-title">대표작</h1></div>
	<div class="featured-grid">
		<div class="featured-block">
			<div class="slider-wrap">
				<button type="button" class="slider-btn prev" data-slider="photoSlider" data-direction="-1" aria-label="이전 사진">‹</button>
				<div id="photoSlider" class="slider" data-auto-slider></div>
				<button type="button" class="slider-btn next" data-slider="photoSlider" data-direction="1" aria-label="다음 사진">›</button>
			</div>
		</div>
		<div class="featured-block black">
			<div class="slider-wrap">
				<button type="button" class="slider-btn prev" data-slider="videoSlider" data-direction="-1" aria-label="이전 영상">‹</button>
				<div id="videoSlider" class="slider" data-auto-slider></div>
				<button type="button" class="slider-btn next" data-slider="videoSlider" data-direction="1" aria-label="다음 영상">›</button>
			</div>
		</div>
	</div>
</section></template>
	<template id="view-template-photography"><section class="section">
	<div class="archive-head">
		<div><p class="kicker">Photography</p><h1 class="section-title">Photography</h1></div>
	</div>
	<div id="archiveList" class="photo-archive"></div>
</section></template>
	<template id="view-template-videography"><section class="section">
	<div class="archive-head">
		<div>
			<p class="kicker">Videography</p>
			<h1 class="section-title">Videography</h1>
		</div>
	</div>
	<div id="archiveList" class="video-project-list"></div>
</section></template>
	<template id="view-template-about"><section class="section home-about">
	<p class="kicker">About</p>
	<h1 class="section-title">HHM<br>Film</h1>
	<div class="about-wrap">
		<div class="about-text" id="aboutText"><p id="artistMessage"></p></div>
		<div class="about-info" id="aboutInfo"></div>
	</div>
</section></template>
	<template id="view-template-detail"><section class="section detail-section">
	<a class="back-link" href="#photography" id="backLink">← Image</a>
	<p class="kicker" id="detailCategory"></p>
	<h1 class="detail-title" id="detailTitle"></h1>
	<p class="detail-caption" id="detailCaption"></p>
	<p class="detail-description" id="detailDescription"></p>
	<div class="item-list" id="itemList"></div>
</section></template>

	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="js/supabase.js?v=20260620-v10"></script>
	<script src="js/app.js?v=20260620-v10"></script>
</body>
</html>
