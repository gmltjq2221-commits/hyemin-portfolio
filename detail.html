<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Detail - HHM Film</title>

	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }
		html { scroll-behavior: smooth; }
		body { font-family: "Pretendard", sans-serif; background: #0f0f0f; color: #f5f5f5; line-height: 1.6; }
		a { color: inherit; text-decoration: none; }
		img { display: block; width: 100%; }
		button { font-family: inherit; border: 0; background: none; cursor: pointer; }

		.wrap { width: 100%; min-height: 100vh; overflow-x: hidden; }
		.header { position: fixed; top: 0; left: 0; z-index: 100; width: 100%; padding: 24px 48px; background: rgba(15, 15, 15, 0.72); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
		.header-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; max-width: 1440px; margin: 0 auto; }
		.logo { font-family: "Playfair Display", serif; font-size: 28px; font-weight: 700; letter-spacing: 0.12em; white-space: nowrap; }
		.nav { display: flex; align-items: center; gap: 34px; }
		.nav a { position: relative; font-size: 14px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255, 255, 255, 0.76); transition: color 0.25s ease; }
		.nav a:hover, .nav a.active { color: #fff; }
		.nav a::after { content: ""; position: absolute; left: 0; bottom: -6px; width: 0; height: 1px; background: #fff; transition: width 0.25s ease; }
		.nav a:hover::after, .nav a.active::after { width: 100%; }
		.menu-btn { display: none; width: 34px; height: 24px; flex-direction: column; justify-content: space-between; }
		.menu-btn span { display: block; width: 100%; height: 2px; background: #fff; }

		.main { padding-top: 84px; }
		.detail-section { min-height: 100vh; padding: 110px 48px; background: #f5f5f5; color: #111; }
		.section-inner { width: 100%; max-width: 1180px; margin: 0 auto; }
		.detail-head { margin-bottom: 54px; }
		.back-link { display: inline-flex; align-items: center; margin-bottom: 34px; font-size: 14px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(17, 17, 17, 0.58); }
		.back-link:hover { color: #111; }
		.detail-category { display: inline-flex; margin-bottom: 18px; padding: 7px 13px; border: 1px solid rgba(17, 17, 17, 0.22); border-radius: 999px; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(17, 17, 17, 0.6); }
		.detail-title { max-width: 980px; font-family: "Playfair Display", serif; font-size: clamp(42px, 7vw, 96px); font-weight: 700; line-height: 1.03; letter-spacing: -0.05em; word-break: keep-all; }
		.detail-caption { margin-top: 22px; max-width: 760px; font-size: 20px; font-weight: 400; color: rgba(17, 17, 17, 0.7); word-break: keep-all; }
		.detail-description { margin-top: 30px; max-width: 820px; font-size: 16px; color: rgba(17, 17, 17, 0.62); white-space: pre-line; word-break: keep-all; }

		.item-list { display: grid; gap: 48px; }
		.item-box { background: #111; color: #fff; overflow: hidden; }
		.item-image { width: 100%; height: auto; }
		.video-wrap { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; overflow: hidden; }
		.video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
		.item-info { padding: 24px 28px 28px; }
		.item-caption { font-size: 18px; font-weight: 700; word-break: keep-all; }
		.item-description { margin-top: 10px; font-size: 14px; color: rgba(255, 255, 255, 0.68); white-space: pre-line; word-break: keep-all; }
		.empty-box { display: flex; align-items: center; justify-content: center; min-height: 360px; padding: 40px; background: #111; color: rgba(255, 255, 255, 0.54); text-align: center; }
		.footer { padding: 32px 48px; border-top: 1px solid rgba(255, 255, 255, 0.1); background: #0f0f0f; color: rgba(255, 255, 255, 0.42); font-size: 13px; }
		.footer-inner { max-width: 1440px; margin: 0 auto; display: flex; justify-content: space-between; gap: 20px; }
		.loading { position: fixed; left: 50%; bottom: 30px; z-index: 200; transform: translateX(-50%); padding: 12px 18px; border-radius: 999px; background: rgba(0, 0, 0, 0.78); color: rgba(255, 255, 255, 0.78); font-size: 13px; backdrop-filter: blur(8px); }
		.loading.hide { display: none; }

		@media (max-width: 1024px) {
			.header { padding: 20px 28px; }
			.detail-section { padding: 90px 28px; }
		}

		@media (max-width: 768px) {
			.header { padding: 18px 20px; }
			.logo { font-size: 23px; }
			.menu-btn { display: flex; }
			.nav { position: fixed; top: 69px; left: 0; display: none; width: 100%; padding: 24px 20px 28px; flex-direction: column; align-items: flex-start; gap: 18px; background: rgba(15, 15, 15, 0.96); border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
			.nav.active { display: flex; }
			.main { padding-top: 69px; }
			.detail-section { padding: 72px 20px; }
			.detail-head { margin-bottom: 36px; }
			.detail-caption { font-size: 17px; }
			.item-list { gap: 28px; }
			.item-info { padding: 20px; }
			.footer { padding: 28px 20px; }
			.footer-inner { display: block; }
			.footer-inner p + p { margin-top: 8px; }
		}
	</style>
</head>

<body>
	<div class="wrap">
		<header class="header">
			<div class="header-inner">
				<a href="index.html" class="logo">HHM FILM</a>

				<button type="button" class="menu-btn" id="menuBtn" aria-label="메뉴 열기">
					<span></span>
					<span></span>
					<span></span>
				</button>

				<nav class="nav" id="nav">
					<a href="index.html">Home</a>
					<a href="images.html">Image</a>
					<a href="videos.html">Video</a>
					<a href="index.html#about">About</a>
				</nav>
			</div>
		</header>

		<main class="main">
			<section class="detail-section">
				<div class="section-inner">
					<div class="detail-head">
						<a href="index.html" class="back-link" id="backLink">← Back</a>
						<p class="detail-category" id="detailCategory" style="display: none;"></p>
						<h1 class="detail-title" id="detailTitle"></h1>
						<p class="detail-caption" id="detailCaption"></p>
						<p class="detail-description" id="detailDescription"></p>
					</div>

					<div class="item-list" id="itemList"></div>
				</div>
			</section>
		</main>

		<footer class="footer">
			<div class="footer-inner">
				<p>© <span id="year"></span> HHM Film.</p>
				<p id="footerText">Detail</p>
			</div>
		</footer>

		<div class="loading" id="loading">데이터를 불러오는 중입니다.</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="js/supabase.js"></script>
	<script src="js/detail.js"></script>
</body>
</html>
